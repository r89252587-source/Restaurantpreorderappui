<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | Desktop & Tablet</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f5f5f5; color: #1A1A1A; }
        .container { max-width: 1200px; width: 90%; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; margin-top: 3rem; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Desktop & Tablet Experience</h1>
        <p>Scaled for large screens with multi-column layouts.</p>
        <div class="grid">
            <div class="card"><h3>Dashboard</h3></div>
            <div class="card"><h3>Menu Explorer</h3></div>
            <div class="card"><h3>Live Tracking</h3></div>
        </div>
    </div>
</body>
</html>
